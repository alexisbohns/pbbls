name: Android

# The repository's first CI workflow (D12). Path-filtered to the Android app so
# it stays dormant for web/admin/ios changes. No secrets needed: the build
# defaults BuildConfig values to empty strings when secrets.properties is absent
# (D8), and this milestone ships only a debug APK.
on:
  pull_request:
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ktlint · unit tests · assemble
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Validate the committed wrapper JAR against known-good checksums.
          validate-wrappers: true

      # Bake the Supabase config into the debug APK from repo Actions secrets so
      # the CI artifact is installable-and-functional (the maintainer has no
      # local Android SDK). build.gradle.kts reads these env vars when
      # secrets.properties is absent. Both values are publishable — the anon key
      # already ships in the web and iOS clients — so a downloadable debug
      # artifact adds no exposure. If the secrets are unset (e.g. a fork), the
      # values default to empty and AppEnvironment fails loud at launch (D8).
      - name: ktlint, unit tests, assemble debug APK
        working-directory: apps/android
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: ./gradlew ktlintCheck testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Renders the @PreviewTest composables to PNGs so the UI is reviewable
      # without a device (the maintainer has no local Android SDK). This uses
      # `update` (not `validate`) deliberately: it always re-renders the current
      # UI and never diffs against a committed baseline — render-to-view, not a
      # regression gate. Baseline-diff regression testing is a future opt-in.
      - name: Render UI screenshots
        working-directory: apps/android
        run: ./gradlew updateDebugScreenshotTest

      - name: Upload UI screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: apps/android/app/src/screenshotTestDebug/reference/**
          if-no-files-found: error
