name: Android

# The repository's first CI workflow (D12). Path-filtered to the Android app so
# it stays dormant for web/admin/ios changes. No secrets needed: the build
# defaults BuildConfig values to empty strings when secrets.properties is absent
# (D8), and this milestone ships only a debug APK.
on:
  pull_request:
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ktlint · unit tests · assemble
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Validate the committed wrapper JAR against known-good checksums.
          validate-wrappers: true

      - name: ktlint, unit tests, assemble debug APK
        working-directory: apps/android
        run: ./gradlew ktlintCheck testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
