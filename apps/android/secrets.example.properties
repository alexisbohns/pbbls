# Copy this file to secrets.properties and fill in real values.
# secrets.properties is git-ignored.
#
# These flow into BuildConfig at build time (see app/build.gradle.kts) and are
# validated at first access by AppEnvironment, which crashes with setup
# instructions if either is blank. A missing file never breaks the build —
# CI compiles with no secrets.

SUPABASE_URL=
SUPABASE_ANON_KEY=

# Release signing (Play distribution) — only needed to build a SIGNED release
# AAB. CI supplies these as env vars from repo Actions secrets; you only need
# them here if you ever build `./gradlew bundleRelease` locally. Leave blank
# (or omit) for debug builds — an unset keystore produces an unsigned build, it
# never fails. See docs/android-play-deploy.md for how to generate the keystore.
#   KEYSTORE_FILE     path to the upload keystore (defaults to upload-keystore.jks)
#   KEYSTORE_PASSWORD keystore password
#   KEY_ALIAS         upload key alias
#   KEY_PASSWORD      key password
KEYSTORE_FILE=
KEYSTORE_PASSWORD=
KEY_ALIAS=
KEY_PASSWORD=
